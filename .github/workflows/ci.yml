name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Pytest
        run: pytest

      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          vargate --tumor T1 --normal N1 --input tests/fixtures/pair --output "$tmp/qc" --quiet
          test -s "$tmp/qc.html"
          test -s "$tmp/qc.tsv"
          grep -q "<html" "$tmp/qc.html"
          head -1 "$tmp/qc.tsv" | grep -q "patient_verdict"

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Mypy
        run: mypy src
